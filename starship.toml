add_newline = false

[username]
style_user = "cyan bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

[character]                            # The name of the module we are configuring is "character"
success_symbol = "[пҒЎ](bold cyan)"     # The "success_symbol" segment is being set to "вһң" with the color "bold green"
error_symbol = "[пҖҚ](bold red)"

[directory]
read_only = " пҖЈ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "оһӯ  "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

#[directory]
#read_only = " п Ҫ"

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[memory_usage]
symbol = "оҝ… "

[nim]
symbol = "оЎҒ "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "п’Ү "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "оңј "
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "оқ• "

[nodejs]
format = "via [оҙҚ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

