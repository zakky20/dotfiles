#################
### MAKE.CONF ###
#################

# Compile Flags
COMMON_FLAGS="-march=native -O3 -pipe -flto ${DIAG_COLORS}"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
RUSTFLAGS="${RUSTFLAGS} -C opt-level=3 -C target-cpu=native"

# Other Stuff
CLICOLOR_FORCE=1
CMAKE_COMPILER_COLOR_DIAGNOSTICS=ON
CMAKE_COLOR_DIAGNOSTICS=ON
DIAG_COLORS="-fdiagnostics-color=always"

# Makeopts
MAKEOPTS="-j8 -l8"

# Portage Settings
PORTAGE_IONICE_COMMAND="ionice -c 3 -p \${PID}"
PORTAGE_NICENESS=15

# Emerge Options
EMERGE_DEFAULT_OPTS="--ask-enter-invalid --autounmask --autounmask-write --with-bdeps=y --keep-going=y --complete-graph=y --tree --deep --verbose --jobs=8 --load-average=8"

# Features
FEATURES="parallel-fetch parallel-install split-log candy noinfo nodoc"

# USE Flags
USE="-systemd -wayland -gnome -cosmic -xfce -kde -plasma -cups -wifi -aqua -pie -cdr -dvd -dvdr -debug -hardened -selinux -static-pic -double-precision -extra-hardened dist-kernel initramfs hddtemp hwaccel udev ext4 lto pgo dbus elogind opengl harfbuzz fontconfig cuda nvidia bluetooth pipewire pulseaudio X"

# Allow All Licenses 
ACCEPT_LICENSE="*"

# Nvidia
VIDEO_CARDS="nvidia"
INPUT_DEVICES="libinput synaptics"

# Language And Grub
LC_MESSAGES=C.UTF-8
GRUB_PLATFORMS="efi-64"

# Mirrors
GENTOO_MIRRORS="https://mirrors.netix.net/gentoo/ http://ftp.romnet.org/gentoo/ https://gentoo.mirrors.ovh.net/gentoo-distfiles/ https://mirror.leaseweb.com/gentoo/"
